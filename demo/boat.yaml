welcome:
  rules:
    - Life jackets on deck under way.
    - One hand for you, one for the boat.
    - No bananas aboard. (Skipper's rule.)
    - Tell the skipper before you go forward.
  whatToExpect: "A relaxed day sail on a classic Catalina 25 out of Gull Point. We usually motor out of the fairway, hoist sail in the bay, and reach toward Gull Point or Heron Island depending on the breeze. Expect 3-5 hours on the water."
  whatToBring:
    - Soft-soled non-marking shoes
    - Sun protection (hat, sunglasses, sunscreen)
    - A layer for the afternoon sea breeze
    - Water bottle and a snack
    - Light rain shell if the sky looks iffy
  safety: "PFDs are stowed under the V-berth (sizes S-XL). The fire extinguisher is mounted by the companionway steps. Flares and the EPIRB live in the orange ditch bag in the port cockpit locker. VHF is at the nav station — Channel 16 for distress, our call sign is WDJ5821. The seacock for the galley sink is under the sink; the engine raw-water seacock is behind the companionway ladder."
